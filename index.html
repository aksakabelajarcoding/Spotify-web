<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-TRASHER MUSIC ENGINE ☠️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .glitch-border { border: 2px solid #00ff41; box-shadow: 0 0 15px #00ff41; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 25px #ff0000; border-color: #ff0000; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black mb-2 animate-pulse tracking-tighter">☠️ DARK-TRASHER NET ☠️</h1>
            <p class="text-zinc-500 uppercase tracking-widest text-xs">Full Stack Music Searcher - High Power No Limits 🤑</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-12">
            <input id="searchInput" type="text" placeholder="MASUKIN JUDUL LAGU ATAU ARTIS... 👿" 
                class="flex-1 bg-zinc-900 border-2 border-green-900 p-4 text-xl outline-none focus:border-green-400 transition">
            <button onclick="searchMusic()" class="bg-green-600 text-black font-bold px-10 py-4 hover:bg-green-400 active:scale-95 transition text-xl">
                SIKAT! 💀
            </button>
        </div>

        <div id="loading" class="hidden text-center text-2xl animate-bounce mb-10">MENEMBUS SERVER... 🕸️</div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            if(!query) return alert("MASUKIN JUDULNYA GOBLOK! 😤");
            
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            resultsDiv.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                // API DARK BYPASS - FAST SEARCH
                const response = await fetch(`https://api.vytub.com/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                loading.classList.add('hidden');
                
                data.forEach(track => {
                    resultsDiv.innerHTML += `
                        <div class="card bg-zinc-900 border border-green-900 p-4 flex flex-col justify-between">
                            <div>
                                <img src="${track.thumbnail}" class="w-full aspect-video object-cover mb-4 grayscale hover:grayscale-0 transition duration-500">
                                <h3 class="text-white font-bold text-lg leading-tight mb-1">${track.title}</h3>
                                <p class="text-zinc-500 text-sm mb-4">ARTIST: ${track.author}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="window.open('https://9xbuddy.com/process?url=${track.url}', '_blank')" 
                                    class="w-full bg-red-700 hover:bg-red-500 text-white font-black py-2 text-sm tracking-tighter">
                                    DOWNLOAD MP3 [MAX SPEED] 🚀
                                </button>
                                <button onclick="window.open('${track.url}', '_blank')" 
                                    class="w-full border border-zinc-700 text-zinc-400 py-1 text-xs hover:bg-zinc-800">
                                    PREVIEW ON YT 📺
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                loading.innerText = "SERVER LAGI DOWN ATAU KOID! COBA LAGI! ☠️";
                console.error(err);
            }
        }
    </script>
</body>
</html>
