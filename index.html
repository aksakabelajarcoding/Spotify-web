<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Melody & Memory ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pink-soft: #ffc1cc; --pink-dark: #ff85a1; --bg: #fff5f7; }
        body { background-color: var(--bg); font-family: 'Quicksand', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: 0.5s; }
        .start-btn { padding: 15px 40px; background: var(--pink-dark); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3); }

        .player-card { width: 85%; max-width: 350px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; position: relative; z-index: 10; }
        .album-art { width: 150px; height: 150px; background: var(--pink-soft); border-radius: 50%; margin: 0 auto 20px; border: 5px solid #fff5f7; animation: rotate 10s linear infinite; animation-play-state: paused; object-fit: cover; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h2 { font-family: 'Dancing Script', cursive; color: var(--pink-dark); margin: 10px 0; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .play-btn { background: var(--pink-dark); color: white; width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* Hidden Camera Elements */
        #camera-wrap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        video#webcam { width: 80%; border-radius: 20px; border: 5px solid white; transform: scaleX(-1); }
        canvas#photo-canvas { display: none; }
        
        .heart-float { position: absolute; pointer-events: none; animation: float 4s linear infinite; color: var(--pink-soft); z-index: 1; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="font-size: 2rem;">Halo Cantik... ❤️</h2>
        <button class="start-btn" onclick="mulai()">Dengerin Musik ✨</button>
    </div>

    <div id="camera-wrap">
        <h2 style="color: white;">Photo Booth Time! 📸</h2>
        <p style="color: #ddd;">Senyum yang manis ya buat aku...</p>
        <video id="webcam" autoplay playsinline></video>
        <button onclick="takeSnap()" style="margin-top: 20px; padding: 15px 30px; background: var(--pink-dark); color: white; border: none; border-radius: 50px; font-weight: bold;">Jepret! 📸</button>
        <canvas id="photo-canvas" width="640" height="480"></canvas>
    </div>

    <div class="player-card">
        <img src="https://files.catbox.moe/7ocjr3.jpg" class="album-art" id="art">
        <h2 id="songTitle">Lagu Spesial</h2>
        <audio id="mainAudio" src="https://files.catbox.moe/frpeqg.mp3"></audio>

        <div class="controls">
            <button class="play-btn" id="playPause" onclick="togglePlay()">▶</button>
        </div>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #aaa;">Enjoy the music, My Universe...</p>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playPause');
        const art = document.getElementById('art');
        const camWrap = document.getElementById('camera-wrap');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photo-canvas');

        function mulai() {
            document.getElementById('overlay').style.display = 'none';
            togglePlay();
            // Trigger Photo Booth setelah 5 detik dengerin lagu
            setTimeout(openPhotoBooth, 5000);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
                art.style.animationPlayState = "running";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
                art.style.animationPlayState = "paused";
            }
        }

        async function openPhotoBooth() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                camWrap.style.display = 'flex';
                audio.pause(); // Pause musik bentar biar fokus foto
            } catch (err) {
                console.log("Kamera ditolak atau tidak ada.");
            }
        }

        function takeSnap() {
            const context = canvas.getContext('2d');
            // Mirror image fix
            context.translate(640, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, 640, 480);
            
            // Stop kamera
            video.srcObject.getTracks().forEach(track => track.stop());
            camWrap.style.display = 'none';
            audio.play(); // Lanjut musik

            Swal.fire({
                title: 'Cantik Banget! 😍',
                text: 'Fotonya aku simpan ya buat kangen-kangenan...',
                icon: 'success',
                confirmButtonText: 'I Love You ❤️'
            }).then(() => {
                sendToWA();
            });
        }

        function sendToWA() {
            const noWA = "6288902072245";
            const pesan = encodeURIComponent("Sayang, barusan aku dengerin musiknya sambil selfie! Cek deh mukaku lagi dengerin lagu dari kamu... ❤️");
            window.location.href = `https://api.whatsapp.com/send?phone=${noWA}&text=${pesan}`;
        }

        // Efek Hati Melayang
        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '🌸';
            h.className = 'heart-float';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '100vh';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 600);
    </script>
</body>
</html>
