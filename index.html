<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify Premium - Darkify Breach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; overflow: hidden; }
        .spotify-bg { background: linear-gradient(to bottom, #1a1a1a 0%, #000 100%); }
        .card-spotify { background: #121212; transition: 0.3s; border-radius: 8px; padding: 12px; border: 1px solid transparent; cursor: pointer; }
        .card-spotify:hover { background: #282828; border-color: #555; transform: translateY(-3px); }
        #scroll-area { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 0px; }
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 flex justify-between items-center bg-black/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <div class="bg-[#1DB954] p-1.5 rounded-full"><i data-lucide="music" class="w-5 h-5 text-black fill-current"></i></div>
            <h1 class="text-xl font-black tracking-tighter">Spotify <span class="text-[#1DB954] italic">PRO</span></h1>
        </div>
        <div class="bg-red-600/20 px-2 py-1 rounded border border-red-600/50 text-[10px] font-bold text-red-500">BYPASS ACTIVE</div>
    </header>

    <main id="scroll-area" class="spotify-bg px-4">
        <div class="relative my-6 group">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 w-5 h-5 group-focus-within:text-[#1DB954]"></i>
            <input type="text" id="query" onkeydown="if(event.key==='Enter') startInjection(this.value)" 
                   placeholder="Cari lagu/artis (Anti-Timeout Mode)..." 
                   class="w-full bg-[#242424] text-white py-4 pl-12 pr-4 rounded-full font-bold outline-none focus:ring-2 focus:ring-[#1DB954] transition-all">
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-32">
            <div class="col-span-full text-center py-20 text-zinc-600 italic">Gak usah manja, ketik nama lagu trus Enter! ☠️</div>
        </div>
    </main>

    <div id="player" class="fixed bottom-20 left-2 right-2 bg-[#121212]/95 backdrop-blur-lg border border-white/5 rounded-xl p-3 flex items-center justify-between shadow-2xl transition-all duration-700 translate-y-48 z-50">
        <div class="flex items-center gap-3 w-[65%]">
            <img id="m-img" src="" class="w-12 h-12 rounded shadow-lg object-cover">
            <div class="truncate">
                <div id="m-title" class="text-sm font-bold truncate">Judul Lagu</div>
                <div id="m-artist" class="text-[10px] text-zinc-400 truncate uppercase tracking-widest">Artist</div>
            </div>
        </div>
        <button onclick="toggle()" class="bg-white p-2.5 rounded-full hover:scale-110 active:scale-90 transition shadow-lg">
            <i id="m-icon" data-lucide="play" class="w-6 h-6 fill-black text-black"></i>
        </button>
        <div id="m-progress" class="absolute bottom-0 left-0 h-[3px] bg-[#1DB954] transition-all duration-300" style="width: 0%"></div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black h-20 flex justify-around items-center border-t border-zinc-900 z-40">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-[#1DB954]"><i data-lucide="home"></i><span class="text-[10px] font-bold">Home</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="search"></i><span class="text-[10px]">Cari</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="library"></i><span class="text-[10px]">Library</span></button>
    </nav>

    <audio id="audio-core"></audio>

    <script>
        const audio = document.getElementById('audio-core');
        const grid = document.getElementById('grid');

        async function startInjection(q) {
            if(!q) return;
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-[#1DB954] font-black loading">BREACHING DATABASE... 😈</div>';
            
            // Triple Engine Proxy
            const engines = [
                `https://saavn.dev/api/search/songs?query=${q}`,
                `https://jiosaavn-api-beta-three.vercel.app/api/search/songs?query=${q}`,
                `https://saavn.me/search/songs?query=${q}`
            ];

            for(let url of engines) {
                try {
                    const res = await fetch(url);
                    const json = await res.json();
                    if(json.data && json.data.results.length > 0) {
                        renderSongs(json.data.results);
                        return;
                    }
                } catch (e) { console.log("Next Engine..."); }
            }
            grid.innerHTML = '<div class="col-span-full text-red-600 font-black text-center py-20">SEMUA SERVER JEBOL! 💀<br><span class="text-[10px] text-zinc-500">Hapus cache Vercel lo atau ganti repo baru, Mek!</span></div>';
        }

        function renderSongs(songs) {
            grid.innerHTML = songs.map(s => `
                <div class="card-spotify" onclick="play('${s.downloadUrl[s.downloadUrl.length-1].url}', '${s.name.replace(/'/g,"")}', '${s.artists.primary[0].name}', '${s.image[s.image.length-1].url}')">
                    <img src="${s.image[s.image.length-1].url}" class="w-full aspect-square object-cover rounded shadow-2xl mb-3">
                    <div class="text-xs font-bold truncate">${s.name}</div>
                    <div class="text-[10px] text-zinc-500 truncate">${s.artists.primary[0].name}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function play(url, t, a, i) {
            document.getElementById('player').classList.remove('translate-y-48');
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-artist').innerText = a;
            document.getElementById('m-img').src = i;
            audio.src = url;
            audio.play();
            updateIcon(true);
        }

        function toggle() {
            audio.paused ? (audio.play(), updateIcon(true)) : (audio.pause(), updateIcon(false));
        }

        function updateIcon(p) {
            document.getElementById('m-icon').setAttribute('data-lucide', p ? 'pause' : 'play');
            lucide.createIcons();
        }

        audio.ontimeupdate = () => {
            document.getElementById('m-progress').style.width = (audio.currentTime / audio.duration * 100) + '%';
        }

        lucide.createIcons();
    </script>
</body>
</html>
